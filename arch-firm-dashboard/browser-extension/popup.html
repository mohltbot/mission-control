<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .icon {
      width: 32px;
      height: 32px;
      background: #3498db;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">AT</div>
    <div class="title">ArchTrack</div>
  </div>
  <div id="status" class="status disconnected">
    Checking connection...
  </div>
  <div class="info">
    This extension sends your browser activity to the ArchTrack desktop tracker for accurate time tracking and classification.
  </div>
  <script src="popup.js"></script>
</body>
</html>
