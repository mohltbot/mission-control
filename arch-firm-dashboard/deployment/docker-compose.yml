version: '3.8'

services:
  archtrack:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: archtrack-admin
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=sqlite:/data/archtrack.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - archtrack-data:/data
      - ../logs:/app/logs
    networks:
      - archtrack-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: archtrack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - archtrack
    networks:
      - archtrack-network

  # Optional: Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: archtrack-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
    command: --interval 3600 archtrack-admin

volumes:
  archtrack-data:
    driver: local
  nginx-certs:
    driver: local

networks:
  archtrack-network:
    driver: bridge
