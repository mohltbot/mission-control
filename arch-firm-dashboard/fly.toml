app = "archtrack-admin"
primary_region = "lax"

[build]
  dockerfile = "deployment/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[mounts]]
  source = "archtrack_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
